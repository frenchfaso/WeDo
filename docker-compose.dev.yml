services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      ENV: development
      DATABASE_URL: sqlite:////app/data/wedo-dev.db
      WEDO_AGENT_API_SECRET: dev-agent-secret
      WEDO_ADMIN_AGENT_API_SECRET: dev-admin-agent-secret
      WEDO_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - .:/app

  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  node_modules:
