<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WeDo</title>
  <meta name="description" content="A mobile-first offline todo app">
  <meta name="application-name" content="WeDo" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WeDo" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0b57d0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    /* Reset & Base Variables */
    :root {
      --bg: #fcfcfc;
      --surface: #ffffff;
      --ink: #111111;
      --ink-muted: #666666;
      --border: #eaeaea;
      --border-hover: #dddddd;
      --accent: #007aff;
      --accent-muted: rgba(0, 122, 255, 0.1);
      --danger: #ff3b30;
      --danger-muted: rgba(255, 59, 48, 0.1);
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--ink);
      font-family: var(--font-family);
      line-height: 1.5;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }

    [x-cloak] { display: none !important; }

    input, button {
      font-family: inherit;
      font-size: 1rem;
      border: none;
      background: none;
      outline: none;
      color: inherit;
      margin: 0;
    }

    button {
      cursor: pointer;
    }

    /* Layout */
    .app-container {
      max-width: 600px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--surface);
      box-shadow: 0 0 40px rgba(0,0,0,0.03);
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      border-bottom: 1px solid var(--border);
      height: 64px;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .version-label {
      font-size: 0.72rem;
      line-height: 1.2;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-center {
      flex: 1;
      text-align: center;
      margin: 0 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .content {
      flex: 1;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* Login */
    .login-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 20px;
      margin-top: 10vh;
    }

    .login-card {
      width: 100%;
      max-width: 320px;
    }

    .login-card h1 {
      font-size: 2.2rem;
      margin-top: 0;
      margin-bottom: 4px;
      text-align: center;
      letter-spacing: -0.03em;
    }

    .login-version {
      margin: 0 0 10px;
      text-align: center;
      color: var(--ink-muted);
      font-size: 0.85rem;
      letter-spacing: 0.02em;
    }

    .login-card p {
      text-align: center;
      color: var(--ink-muted);
      margin-bottom: 32px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-form input {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: var(--radius);
      transition: border-color 0.2s;
    }

    .login-form input:focus {
      border-color: var(--accent);
    }

    .login-form button {
      background: var(--ink);
      color: #fff;
      padding: 14px;
      border-radius: var(--radius);
      font-weight: 600;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .login-form button:active {
      opacity: 0.8;
    }

    .login-form button:disabled {
      opacity: 0.5;
    }

    /* Inline Add Bar */
    .add-bar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .inline-add {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .inline-add input {
      flex: 1;
      font-size: 1.05rem;
    }

    .inline-add input::placeholder {
      color: #a0a0a0;
    }

    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-muted);
      color: var(--accent);
      padding: 0;
      transition: background 0.15s;
    }

    .add-btn:active {
      background: rgba(0, 122, 255, 0.2);
    }

    /* List Items */
    .list-group {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .list-item {
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .row-content {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .row-content:active {
      background: var(--bg);
    }

    .row-text {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: flex-start;
      flex-direction: column;
      gap: 3px;
    }

    .row-title {
      font-size: 1.05rem;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .row-title.done {
      color: var(--ink-muted);
      text-decoration: line-through;
    }

    .row-meta {
      font-size: 0.78rem;
      line-height: 1.2;
      color: var(--ink-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--ink-muted);
      flex-shrink: 0;
    }

    .meta-badge.shared {
      color: var(--accent);
      border-color: rgba(0, 122, 255, 0.18);
      background: rgba(0, 122, 255, 0.08);
    }

    /* Checkbox */
    .checkbox-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-radius: 50%;
      color: transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .checkbox-wrap.done {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Actions */
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      color: var(--ink-muted);
      border-radius: 50%;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .icon-btn.small {
      width: 32px;
      height: 32px;
    }

    .icon-btn:active {
      background: var(--bg);
      color: var(--ink);
    }

    .row-actions {
      display: flex;
      align-items: center;
      margin-right: -10px; /* offset the icon-btn padding */
    }

    /* Popover Menu */
    .menu-popover {
      position: absolute;
      right: 20px;
      top: 50px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      border-radius: 8px;
      padding: 4px;
      min-width: 140px;
      z-index: 20;
      display: flex;
      flex-direction: column;
    }

    .menu-popover.header-popover {
      top: 56px;
      right: 16px;
    }

    .menu-popover button {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.95rem;
      border-radius: 4px;
      width: 100%;
      transition: background 0.15s;
    }

    .menu-popover button:active {
      background: var(--bg);
    }

    .menu-popover button.danger {
      color: var(--danger);
    }

    /* Inline Edit */
    .inline-edit {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 8px;
      background: var(--bg);
    }

    .inline-edit input {
      flex: 1;
      border-bottom: 2px solid var(--accent);
      padding: 8px 0;
      font-size: 1.05rem;
      border-radius: 0;
      background: transparent;
    }

    .edit-actions {
      display: flex;
      gap: 4px;
    }

    /* Notices */
    .notices {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .notice {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
    }

    .notice.error {
      background: var(--danger-muted);
      color: var(--danger);
    }

    .notice.info {
      background: var(--accent-muted);
      color: var(--accent);
      font-size: 0.85rem;
      padding: 6px 12px;
      justify-content: center;
      border-radius: 20px;
      width: fit-content;
      margin: 0 auto;
    }

    .notice.warning {
      background: rgba(255, 149, 0, 0.12);
      color: #b86a00;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--ink-muted);
      font-size: 1.05rem;
    }

    [x-transition] {
      transition: opacity 0.15s ease-out;
    }
    [x-transition\.opacity] {
      transition-property: opacity;
    }

    .app-shell {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100vh;
      position: relative;
    }

    .app-shell.locked {
      overflow: hidden;
    }

    .app-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100vh;
    }

    .app-shell.locked .app-panel {
      filter: blur(4px);
      pointer-events: none;
      user-select: none;
    }

    .modal-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(17, 17, 17, 0.34);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .modal-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(17, 17, 17, 0.18);
      padding: 24px;
    }

    .modal-card h2 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: -0.03em;
    }

    .modal-card p {
      margin: 10px 0 0;
      color: var(--ink-muted);
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-form input {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: var(--radius);
    }

    .modal-form input:focus {
      border-color: var(--accent);
    }

    .modal-form button {
      background: var(--ink);
      color: #fff;
      padding: 14px;
      border-radius: var(--radius);
      font-weight: 600;
      margin-top: 4px;
    }

    .modal-form button:disabled {
      opacity: 0.5;
    }

    .modal-hint {
      font-size: 0.88rem;
      color: var(--ink-muted);
    }

    .share-list {
      list-style: none;
      margin: 16px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .share-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg);
    }

    .share-user {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .share-user strong {
      font-size: 0.98rem;
    }

    .share-user span {
      font-size: 0.8rem;
      color: var(--ink-muted);
    }

    .text-btn {
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--ink-muted);
    }

    .text-btn.danger {
      color: var(--danger);
      background: var(--danger-muted);
    }
  </style>
</head>
<body x-data="app()">
  <main class="app-container" x-cloak>

    <!-- LOGIN VIEW -->
    <section class="login-view" x-show="!isAuthenticated">
      <div class="login-card">
        <h1>WeDo</h1>
        <div class="login-version" x-text="appVersion"></div>
        <p>A fast, offline-first list app.</p>
        <form class="login-form" @submit.prevent="login">
          <input type="text" x-model="username" placeholder="Username" autocomplete="username" required />
          <input type="password" x-model="password" placeholder="Password" autocomplete="current-password" />
          <button type="submit" :disabled="loading">Log In</button>
        </form>
        <div class="notices">
          <div class="notice warning">At first access, leave password empty and choose it in the welcome popup.</div>
        </div>
        <div class="notices" x-show="error">
          <div class="notice error" x-text="error"></div>
        </div>
      </div>
    </section>

    <!-- AUTHENTICATED WRAPPER -->
    <template x-if="isAuthenticated">
      <div class="app-shell" :class="{ 'locked': passwordSetupRequired }">
        <div class="app-panel">

        <!-- Global Notices -->
        <div class="notices" x-show="syncError || error">
          <div class="notice error" x-show="error" x-text="error"></div>
          <div class="notice error" x-show="syncError" x-text="syncError"></div>
        </div>
        <div style="padding-top: 8px; position: absolute; width: 100%; top: 64px; z-index: 5;" x-show="syncing">
          <div class="notice info">Syncing...</div>
        </div>

        <!-- LISTS VIEW -->
        <section x-show="!isDetailRoute" style="display: flex; flex-direction: column; flex: 1;">
          <header class="app-header">
            <div class="brand-block">
              <h1 class="brand">WeDo</h1>
              <div class="version-label" x-text="appVersion"></div>
            </div>
            <button class="icon-btn" @click.prevent="logout" aria-label="Logout">
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
          </header>

          <div class="content">
            <div class="add-bar">
              <form @submit.prevent="createList" class="inline-add">
                <button type="submit" class="add-btn" aria-label="Add list">
                  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <input type="text" x-model="newListName" placeholder="Add a new list..." required />
              </form>
            </div>

            <div class="empty-state" x-show="lists.length === 0">
              No lists yet. Add one above to get started.
            </div>

            <ul class="list-group" x-show="lists.length > 0">
              <template x-for="list in lists" :key="list.id">
                <li class="list-item">
                  <template x-if="editingListId !== list.id">
                    <div class="row-content" @click="openList(list.id)">
                      <div class="row-text">
                        <span class="row-title" x-text="list.name"></span>
                        <span class="row-meta" x-text="listMeta(list)"></span>
                      </div>
                      <span class="meta-badge" :class="{ 'shared': list.access_role === 'shared' }" x-text="list.access_role === 'shared' ? 'Shared' : 'Owned'"></span>
                      <div class="row-actions" @click.stop>
                        <button class="icon-btn small" @click="toggleListMenu(list.id)" aria-label="List options">
                          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                        </button>
                        <div class="menu-popover" x-show="openListMenuId === list.id" @click.away="closeListMenu()" x-transition.opacity>
                          <button x-show="canManageList(list)" @click="openShareManagerFromMenu(list)">Share</button>
                          <button x-show="canManageList(list)" @click="renameListFromMenu(list)">Rename</button>
                          <button class="danger" x-show="canManageList(list)" @click="deleteListFromMenu(list.id)">Delete</button>
                        </div>
                      </div>
                    </div>
                  </template>

                  <template x-if="editingListId === list.id">
                    <form class="inline-edit" @submit.prevent="saveListEdit">
                      <input type="text" x-model="editingListName" x-init="$el.focus()" required />
                      <div class="edit-actions">
                        <button type="button" @click="cancelListEdit" class="icon-btn small"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                        <button type="submit" class="icon-btn small" style="color: var(--accent);"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                      </div>
                    </form>
                  </template>
                </li>
              </template>
            </ul>
          </div>
        </section>

        <!-- DETAIL VIEW -->
        <section x-show="isDetailRoute" style="display: flex; flex-direction: column; flex: 1;">
          <header class="app-header">
            <button class="icon-btn" @click="showLists" aria-label="Back to lists" style="margin-left: -10px;">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>

            <div class="header-center">
              <div x-text="selectedList ? selectedList.name : 'Loading...'"></div>
              <div class="version-label" x-text="hasSelectedList ? selectedListMeta : appVersion"></div>
            </div>

            <div style="position: relative; margin-right: -10px;">
              <button class="icon-btn" @click="toggleDetailMenu()" x-show="hasSelectedList && canManageSelectedList" aria-label="List options">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
              </button>
              <div class="menu-popover header-popover" x-show="detailMenuOpen" @click.away="closeDetailMenu()" x-transition.opacity>
                <button @click="openSelectedListShareManagerFromMenu()">Share List</button>
                <button @click="renameSelectedListFromMenu()">Rename List</button>
                <button class="danger" @click="removeSelectedListFromMenu()">Delete List</button>
              </div>
            </div>
          </header>

          <div class="content">
            <template x-if="isEditingSelectedList">
              <form class="inline-edit" @submit.prevent="saveListEdit" style="border-bottom: 1px solid var(--border);">
                <input type="text" x-model="editingListName" x-init="$el.focus()" required />
                <div class="edit-actions">
                  <button type="button" @click="cancelListEdit" class="icon-btn small"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                  <button type="submit" class="icon-btn small" style="color: var(--accent);"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                </div>
              </form>
            </template>

            <div class="add-bar" x-show="hasSelectedList">
              <form @submit.prevent="createTodo" class="inline-add">
                <button type="submit" class="add-btn" aria-label="Add todo">
                  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <input type="text" x-model="newTodoTitle" placeholder="Add a to-do..." required />
              </form>
            </div>

            <div class="empty-state" x-show="hasSelectedList && todos.length === 0">
              No items yet. Add something above.
            </div>

            <ul class="list-group" x-show="todos.length > 0">
              <template x-for="todo in todos" :key="todo.id">
                <li class="list-item">
                  <template x-if="editingTodoId !== todo.id">
                    <div class="row-content" @click="toggleTodo(todo.id)">
                      <div class="checkbox-wrap" :class="{ 'done': todo.done }">
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" x-show="todo.done"><polyline points="20 6 9 17 4 12"></polyline></svg>
                      </div>
                      <div class="row-text">
                        <span class="row-title" :class="{ 'done': todo.done }" x-text="todo.title"></span>
                      </div>
                      <div class="row-actions" @click.stop>
                        <button class="icon-btn small" @click="toggleTodoMenu(todo.id)" aria-label="Todo options">
                          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                        </button>
                        <div class="menu-popover" x-show="openTodoMenuId === todo.id" @click.away="closeTodoMenu()" x-transition.opacity>
                          <button @click="editTodoFromMenu(todo)">Edit</button>
                          <button class="danger" @click="deleteTodoFromMenu(todo.id)">Delete</button>
                        </div>
                      </div>
                    </div>
                  </template>

                  <template x-if="editingTodoId === todo.id">
                    <form class="inline-edit" @submit.prevent="saveTodoEdit">
                      <input type="text" x-model="editingTodoTitle" x-init="$el.focus()" required />
                      <div class="edit-actions">
                        <button type="button" @click="cancelTodoEdit" class="icon-btn small"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                        <button type="submit" class="icon-btn small" style="color: var(--accent);"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                      </div>
                    </form>
                  </template>
                </li>
              </template>
            </ul>
          </div>
        </section>
        </div>

        <div class="modal-overlay" x-show="passwordSetupRequired" x-transition.opacity>
          <div class="modal-card">
            <h2 x-text="passwordSetupTitle"></h2>
            <p>Completa questo passaggio per sbloccare liste, todo e sincronizzazione.</p>
            <form class="modal-form" @submit.prevent="submitPasswordSetup">
              <input type="password" x-model="passwordSetup" placeholder="Nuova password" autocomplete="new-password" required />
              <input type="password" x-model="passwordSetupConfirm" placeholder="Conferma password" autocomplete="new-password" required />
              <div class="modal-hint">Minimo 8 caratteri. Le due password devono combaciare.</div>
              <button type="submit" :disabled="passwordSetupLoading">Conferma password</button>
            </form>
            <div class="notices" x-show="passwordSetupError" style="padding: 0; margin-top: 16px;">
              <div class="notice error" x-text="passwordSetupError"></div>
            </div>
          </div>
        </div>

        <div class="modal-overlay" x-show="shareModalOpen" x-transition.opacity>
          <div class="modal-card">
            <h2 x-text="shareModalTitle"></h2>
            <p>Invite by username. Shared users can manage todos but not rename, delete, archive, or re-share the list.</p>
            <form class="modal-form" @submit.prevent="addShareMember">
              <input type="text" x-model="shareUsername" placeholder="Username to invite" autocomplete="off" required />
              <button type="submit" :disabled="shareSaving">Add person</button>
            </form>
            <div class="notices" x-show="shareError || shareLoading" style="padding: 0; margin-top: 16px;">
              <div class="notice info" x-show="shareLoading">Loading access…</div>
              <div class="notice error" x-show="shareError" x-text="shareError"></div>
            </div>
            <ul class="share-list" x-show="!shareLoading && shareMembers.length > 0">
              <template x-for="member in shareMembers" :key="member.user_id">
                <li class="share-row">
                  <div class="share-user">
                    <strong x-text="member.username"></strong>
                    <span>Can add, edit, complete, and delete todos</span>
                  </div>
                  <button type="button" class="text-btn danger" @click="revokeShareMember(member.user_id)" :disabled="shareSaving">Remove</button>
                </li>
              </template>
            </ul>
            <div class="empty-state" x-show="!shareLoading && shareMembers.length === 0" style="padding: 24px 0 8px;">Nobody else has access yet.</div>
            <div class="edit-actions" style="justify-content: flex-end; margin-top: 12px;">
              <button type="button" class="text-btn" @click="closeShareModal()">Done</button>
            </div>
          </div>
        </div>
      </div>
    </template>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
